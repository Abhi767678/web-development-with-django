{% extends 'store/base.html' %}
{% block title %}Login — SportZone{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card p-4">
            <h3 class="text-center mb-4 fw-bold">
                <i class="fas fa-running text-danger me-2"></i>SportZone
            </h3>
            <h5 class="text-center text-muted mb-4">Login to your account</h5>

            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Enter username" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">
                    <i class="fas fa-sign-in-alt me-2"></i>Login
                </button>
            </form>

            <p class="text-center mt-3 text-muted">
                Don't have an account? <a href="{% url 'register' %}" class="text-danger">Register</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
