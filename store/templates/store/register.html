{% extends 'store/base.html' %}
{% block title %}Register — SportZone{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-5">
        <div class="card p-4">
            <h4 class="text-center fw-bold mb-4">
                <i class="fas fa-user-plus text-danger me-2"></i>Create Account
            </h4>

            <form method="POST">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <div class="text-danger small mt-1">{{ field.errors.0 }}</div>
                    {% endif %}
                </div>
                {% endfor %}
                <button type="submit" class="btn btn-primary w-100 py-2">
                    <i class="fas fa-user-plus me-2"></i>Register
                </button>
            </form>

            <p class="text-center mt-3 text-muted">
                Already have an account? <a href="{% url 'login' %}" class="text-danger">Login</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
